<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Cosmetóloga Analía Velazco</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>Panel Admin</h1>
    <p class="login-subtitle">Cosmetóloga Analía Velazco</p>
    <form id="login-form">
      <div class="field">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div id="error-msg" class="error-msg" hidden></div>
      <button type="submit" class="btn-admin">Ingresar</button>
    </form>
  </div>
  <script>
    const WORKER_URL = 'https://cosmetologa-analia-velazco-api.valorsolutions.workers.dev'
  </script>
  <script src="../js/admin-login.js"></script>
</body>
</html>
